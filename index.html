*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f7fa;color:var(--tx);padding:18px}
h1{font-size:20px;color:var(--blue);display:inline-block}
.sub{color:var(--mut);font-size:12px;margin:4px 0 12px}
.badge{display:inline-block;background:#fef5e7;color:var(--org);font-size:11px;padding:2px 8px;border-radius:10px;margin-left:8px;vertical-align:middle}
.tabs{display:flex;gap:4px;margin-bottom:14px;border-bottom:2px solid var(--bd)}
.tabs button{padding:9px 22px;border:none;background:none;font-size:14px;color:var(--mut);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
.tabs button.on{color:var(--blue);font-weight:700;border-bottom-color:var(--blue)}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.filters select,.filters input{padding:6px 10px;border:1px solid var(--bd);border-radius:6px;background:#fff;font-size:13px;color:var(--tx)}
.filters button{padding:6px 14px;border:1px solid var(--bd);border-radius:6px;background:#fff;cursor:pointer;font-size:13px;color:var(--mut)}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:12px 14px}
.kpi .v{font-size:22px;font-weight:700;color:var(--blue)}
.kpi .v.ok{color:var(--ok)} .kpi .v.bad{color:var(--warn)}
.kpi .l{font-size:12px;color:var(--mut);margin-top:2px}
.kpi .s{font-size:11px;color:var(--mut)}
.grid2{display:grid;grid-template-columns:3fr 2fr;gap:12px;margin-bottom:12px}
.grid22{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.card{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:14px 16px}
.card h3{font-size:14px;margin-bottom:10px;color:var(--blue)}
.card h3 .hint{font-weight:400;font-size:11px;color:var(--mut)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--lt);color:var(--blue);text-align:left;padding:6px 8px;position:sticky;top:0;cursor:pointer;white-space:nowrap}
td{padding:5px 8px;border-bottom:1px solid var(--bd)}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
.tbl-wrap{max-height:560px;overflow:auto}
.rate{display:inline-block;min-width:52px;text-align:right;padding:1px 6px;border-radius:4px;font-weight:600}
.rate.g{background:#e8f5e9;color:var(--ok)} .rate.r{background:#fdecea;color:var(--warn)} .rate.y{background:#fff8e1;color:#9a6400} .rate.na{color:var(--mut);font-weight:400}
.tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:11px}
.tag.unassigned{background:#fdecea;color:var(--warn)}
.tag.left{background:#fef5e7;color:#9a6400}
.tag.append{background:#fce4d6;color:var(--org)}
.bar-bg{background:var(--lt);border-radius:4px;height:14px;position:relative;overflow:hidden}
.bar-fg{background:var(--blue2);height:100%;border-radius:4px}
.risk li{font-size:12px;padding:5px 0;border-bottom:1px dashed var(--bd);display:flex;justify-content:space-between;gap:8px}
.risk{list-style:none}
.risk .who{color:var(--mut)}
.page{display:none}.page.on{display:block}
.note{font-size:11px;color:var(--mut);margin-top:6px}
@media(max-width:980px){.grid2,.grid22{grid-template-columns:1fr}}
/* ── 多选下拉 ── */
.ms-wrap{position:relative;display:inline-block}
.ms-btn{padding:6px 10px;border:1px solid var(--bd);border-radius:6px;background:#fff;font-size:13px;color:var(--tx);cursor:pointer;min-width:80px;user-select:none;white-space:nowrap}
.ms-btn .ms-count{background:var(--blue2);color:#fff;border-radius:10px;padding:1px 6px;font-size:11px;margin-left:4px}
.ms-panel{display:none;position:absolute;top:calc(100% + 4px);left:0;background:#fff;border:1px solid var(--bd);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:300;min-width:120px;max-height:240px;overflow-y:auto}
.ms-panel.open{display:block}
.ms-item{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;font-size:13px;white-space:nowrap}
.ms-item:hover{background:var(--lt)}
.ms-item input[type=checkbox]{accent-color:var(--blue2);width:14px;height:14px;cursor:pointer}
/* ── SKU 自动补全 ── */
.ac-wrap{position:relative;display:inline-block}
.ac-tags{display:flex;flex-wrap:wrap;gap:4px;align-items:center;padding:4px 8px;border:1px solid var(--bd);border-radius:6px;background:#fff;min-width:160px;min-height:32px;cursor:text}
.ac-tag{background:var(--lt);color:var(--blue);border-radius:4px;padding:1px 7px;font-size:12px;display:inline-flex;align-items:center;gap:3px;white-space:nowrap}
.ac-tag .ac-x{cursor:pointer;color:var(--mut);font-size:13px;line-height:1}
.ac-tag .ac-x:hover{color:var(--warn)}
.ac-input{border:none;outline:none;font-size:13px;min-width:90px;color:var(--tx);background:transparent}
.ac-drop{display:none;position:absolute;top:calc(100% + 4px);left:0;background:#fff;border:1px solid var(--bd);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:300;min-width:210px;max-height:220px;overflow-y:auto}
.ac-drop.open{display:block}
.ac-opt{padding:7px 12px;cursor:pointer;font-size:13px}
.ac-opt:hover{background:var(--lt)}
.ac-opt .ac-sub{font-size:11px;color:var(--mut);margin-top:1px}
</style>
</head>

<script>
const M6=[...Array(6)].map((_,i)=>(i+1)+'月');
const fmt=n=>n>=10000?(n/10000).toFixed(2)+'万':Math.round(n).toLocaleString();
const pct=(a,t)=>t>0?(a/t*100):null;
const pctTxt=p=>p===null?'—':p.toFixed(1)+'%';

const FKey={fArea:'a',fBrand:'b',fSite:'s',fOwner:'o',fCat:'c'};

function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function buildMultiSelect(id){
  const vals=[...new Set(DATA.map(r=>r[FKey[id]]))].sort();
  document.getElementById(id).innerHTML=
    `<div class="ms-btn" onclick="toggleMS('${id}',event)"><span id="mslbl_${id}">全部${FL[id]}</span></div>`+
    `<div class="ms-panel" id="mspanel_${id}">`+
    vals.map(v=>`<label class="ms-item"><input type="checkbox" value="${escH(v)}" onchange="onMSChange('${id}')"><span>${escH(v)}</span></label>`).join('')+
    `</div>`;
}
function toggleMS(id,e){
  e&&e.stopPropagation();
  const panel=document.getElementById('mspanel_'+id);
  const wasOpen=panel.classList.contains('open');
  closeAllDD();
  if(!wasOpen)panel.classList.add('open');
}
function onMSChange(id){
  const checked=[...document.querySelectorAll(`#mspanel_${id} input:checked`)].map(i=>i.value);
  MS[id]=new Set(checked);
  const lbl=document.getElementById('mslbl_'+id);
  lbl.innerHTML=checked.length?`${FL[id]}<span class="ms-count">${checked.length}</span>`:`全部${FL[id]}`;
  render();
}
for(const id in FKey)buildMultiSelect(id);

// ── SKU 自动补全 ──
const acSelected=new Set();

function levenSim(a,b){
  const m=a.length,n=b.length;
  if(!m&&!n)return 1;if(!m||!n)return 0;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i||j));
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return 1-dp[m][n]/Math.max(m,n);
}
function isNumOnly(s){return/^\d+$/.test(s);}
function numSim(q,c){
  // 前缀/子串匹配给予更高分数，避免纯Levenshtein对长度差异的过度惩罚
  if(c.startsWith(q))return Math.max(0.7,q.length/c.length);
  if(q.startsWith(c))return Math.max(0.7,c.length/q.length);
  if(c.includes(q))return q.length/c.length*0.85;
  return levenSim(q,c);
}
function skuScore(q,k,m){
  const ql=q.toLowerCase(),kl=k.toLowerCase(),ml=String(m).toLowerCase();
  if(isNumOnly(q)){
    const sk=isNumOnly(kl)?numSim(ql,kl):0;
    const sm=isNumOnly(ml)?numSim(ql,ml):levenSim(ql,ml);
    return Math.max(sk,sm);
  }
  const scoreStr=(a,b)=>b.includes(a)?0.8+(a.length/b.length*0.2):levenSim(a,b);
  return Math.max(scoreStr(ql,kl),scoreStr(ql,ml));
}

function buildACDrop(){
  const inp=document.getElementById('acInput');
  const q=(inp?inp.value:'').trim();
  const drop=document.getElementById('acDrop');
  if(!q){drop.classList.remove('open');return;}
  const THRESHOLD=isNumOnly(q)?0.7:0.1;
  const seen=new Set(),matches=[];
  DATA.forEach(r=>{
    if(!seen.has('k:'+r.k)&&!acSelected.has(r.k)){
      const sc=skuScore(q,r.k,r.k);
      if(sc>=THRESHOLD){seen.add('k:'+r.k);matches.push({val:r.k,label:r.k,sub:r.m,sc});}
    }
    if(!seen.has('m:'+r.m)&&!acSelected.has(r.m)&&String(r.m)!==r.k){
      const sc=skuScore(q,r.k,r.m);
      if(sc>=THRESHOLD){seen.add('m:'+r.m);matches.push({val:r.m,label:String(r.m),sub:r.k,sc});}
    }
  });
  matches.sort((a,b)=>b.sc-a.sc);
  const top=matches.slice(0,12);
  if(!top.length){drop.classList.remove('open');return;}
  drop.innerHTML=top.map(o=>`<div class="ac-opt" data-val="${escH(o.val)}" onclick="selectAC(this.dataset.val)">${escH(o.label)}<div class="ac-sub">${escH(String(o.sub))}</div></div>`).join('');
  drop.classList.add('open');
}
function selectAC(val){
  acSelected.add(val);
  renderACTags();
  const inp=document.getElementById('acInput');
  if(inp){inp.value='';inp.focus();}
  document.getElementById('acDrop').classList.remove('open');
  render();
}
function removeAC(val){acSelected.delete(val);renderACTags();render();}
function renderACTags(){
  document.getElementById('acTagsInner').innerHTML=[...acSelected].map(v=>
    `<span class="ac-tag">${escH(v)}<span class="ac-x" data-val="${escH(v)}" onclick="removeAC(this.dataset.val)">×</span></span>`).join('');
  const inp=document.getElementById('acInput');
  if(inp)inp.placeholder=acSelected.size?'':'搜索SKU/型号';
}

// ── 关闭所有下拉 ──
function closeAllDD(){
  document.querySelectorAll('.ms-panel').forEach(p=>p.classList.remove('open'));
  const d=document.getElementById('acDrop');if(d)d.classList.remove('open');
}
document.addEventListener('click',closeAllDD);
document.getElementById('acTags').addEventListener('click',e=>e.stopPropagation());
document.getElementById('acDrop').addEventListener('click',e=>e.stopPropagation());
(function(){
  const inp=document.getElementById('acInput');
  inp.addEventListener('input',buildACDrop);
  inp.addEventListener('focus',buildACDrop);
  inp.addEventListener('click',e=>e.stopPropagation());
  inp.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('acDrop').classList.remove('open');});
})();

// ── 重置 & 过滤 ──
function resetF(){
  for(const id in FKey){
    MS[id].clear();
    document.querySelectorAll(`#mspanel_${id} input`).forEach(i=>i.checked=false);
    document.getElementById('mslbl_'+id).textContent='全部'+FL[id];
  }
  acSelected.clear();renderACTags();render();
}
function filtered(extra){
  const inp=document.getElementById('acInput');
  const q=(inp?inp.value:'').trim().toLowerCase();
  return DATA.filter(r=>{
    for(const id in FKey){if(MS[id].size&&!MS[id].has(r[FKey[id]]))return false;}
    if(extra&&r.a!==extra)return false;
    if(acSelected.size){
      if(![...acSelected].some(v=>r.k===v||String(r.m)===v))return false;
    }else if(q){
      if(skuScore(q,r.k,r.m)<(isNumOnly(q)?0.7:0.1))return false;
    }
    return true;
  });
}
const sumT6=rows=>rows.reduce((a,r)=>a+r.t.slice(0,6).reduce((x,y)=>x+y,0),0);
const sumA6=rows=>rows.reduce((a,r)=>a+(r.v?r.v.reduce((x,y)=>x+y,0):0),0);
const sumTY=rows=>rows.reduce((a,r)=>a+r.t.reduce((x,y)=>x+y,0),0);

function mkChart(id,cfg){if(charts[id])charts[id].destroy();charts[id]=new Chart(document.getElementById(id),cfg);}
function monthChart(id,rows,subRows){
  const tgt=M6.map((_,i)=>rows.reduce((a,r)=>a+r.t[i],0));
  const act=M6.map((_,i)=>rows.reduce((a,r)=>a+(r.v?r.v[i]:0),0));
  let ct=0,ca=0;const cum=M6.map((_,i)=>{ct+=tgt[i];ca+=act[i];return ct>0?ca/ct*100:null;});
  const afterLbl=subRows?c=>{
    if(c.dataset.yAxisID==='y2')return null;
    const i=c.dataIndex,isAct=c.dataset.label==='实际';
    return subRows.map(sub=>{
      const val=isAct
        ?sub.rows.reduce((a,r)=>a+(r.v?r.v[i]:0),0)
        :sub.rows.reduce((a,r)=>a+r.t[i],0);
      return `  ${sub.label}: ${fmt(val)}台`;
    });
  }:undefined;
  mkChart(id,{data:{labels:M6,datasets:[
    {type:'bar',label:'目标',data:tgt,backgroundColor:'#c5d8e8',borderRadius:3},
    {type:'bar',label:'实际',data:act,backgroundColor:M6.map((_,i)=>i===5?'rgba(58,118,173,.45)':'#3a76ad'),borderRadius:3},
    {type:'line',label:'累计达成率%',data:cum,yAxisID:'y2',borderColor:'#c0392b',backgroundColor:'#c0392b',tension:.2,pointRadius:3}
  ]},options:{plugins:{tooltip:{callbacks:{
    label:c=>c.dataset.label+': '+(c.dataset.yAxisID==='y2'?c.raw.toFixed(1)+'%':fmt(c.raw)+'台'),
    afterLabel:afterLbl
  }}},
    scales:{y:{ticks:{callback:fmt}},y2:{position:'right',grid:{display:false},ticks:{callback:v=>v+'%'},suggestedMax:100}}}});
}
function rateBar(id,pairs,horizontal=true){
  pairs=pairs.filter(p=>p[1]>0).sort((a,b)=>(b[2]/b[1])-(a[2]/a[1]));
  mkChart(id,{type:'bar',data:{labels:pairs.map(p=>p[0]),datasets:[{data:pairs.map(p=>p[2]/p[1]*100),
    backgroundColor:pairs.map(p=>p[2]/p[1]>=1?'#1e7e34':p[2]/p[1]>=.6?'#3a76ad':'#c0392b'),borderRadius:3}]},
    options:{indexAxis:horizontal?'y':'x',plugins:{legend:{display:false},
      tooltip:{callbacks:{label:c=>{const p=pairs[c.dataIndex];return `达成 ${c.raw.toFixed(1)}%（实际${fmt(p[2])} / 目标${fmt(p[1])}）`;}}}},
      scales:{[horizontal?'x':'y']:{ticks:{callback:v=>v+'%'},suggestedMax:100}}}});
}
function groupTA(rows,key){
  const g={};
  rows.forEach(r=>{const k=r[key];g[k]=g[k]||[0,0];g[k][0]+=r.t.slice(0,6).reduce((a,b)=>a+b,0);g[k][1]+=r.v?r.v.reduce((a,b)=>a+b,0):0;});
  return Object.entries(g).map(([k,v])=>[k,v[0],v[1]]);
}
function kpiHtml(label,t,a,extraCls){
  const p=pct(a,t);
  const cls=p===null?'':p>=TIME_PROG*2.24?'ok':p<40?'bad':'';
  return `<div class="kpi"><div class="v ${extraCls||cls}">${pctTxt(p)}</div><div class="l">${label}达成率</div><div class="s">实际 ${fmt(a)} / 目标 ${fmt(t)}</div></div>`;
}

function buildAreaPage(el,area){
  el.innerHTML=`<div class="kpis" id="kpis_${area}"></div>
  <div class="grid2">
    <div class="card"><h3>${area} 月度目标 vs 实际</h3><canvas id="cM_${area}" height="120"></canvas></div>
    <div class="card"><h3>${area} 站点达成率</h3><canvas id="cS_${area}" height="160"></canvas></div>
  </div>
  <div class="grid22">
    <div class="card"><h3>${area} 负责人达成率</h3><canvas id="cO_${area}" height="160"></canvas></div>
    <div class="card"><h3>${area} 品牌达成率</h3><canvas id="cB_${area}" height="160"></canvas></div>
  </div>
  <div class="grid22">
    <div class="card"><h3>缺口最大 Top10 <span class="hint">1–6月 目标-实际</span></h3><ul class="risk" id="gap_${area}"></ul></div>
    <div class="card"><h3>达成率最低 Top10 <span class="hint">仅看目标≥50台的行</span></h3><ul class="risk" id="low_${area}"></ul></div>
  </div>`;
}
buildAreaPage(document.getElementById('p1'),'SC');
buildAreaPage(document.getElementById('p2'),'VC');

function renderArea(area){
  const rows=filtered(area);
  const t6=sumT6(rows),a6=sumA6(rows),ty=sumTY(rows);
  document.getElementById('kpis_'+area).innerHTML=
    kpiHtml(area+' 1–6月',t6,a6)+
    `<div class="kpi"><div class="v">${fmt(a6)}</div><div class="l">1–6月实际销量</div></div>`+
    `<div class="kpi"><div class="v">${fmt(t6)}</div><div class="l">1–6月目标</div></div>`+
    `<div class="kpi"><div class="v">${fmt(ty)}</div><div class="l">全年目标</div><div class="s">时间进度 ${TIME_PROG}%｜全年完成 ${pctTxt(pct(a6,ty))}</div></div>`+
    `<div class="kpi"><div class="v">${rows.length}</div><div class="l">SKU 行数</div><div class="s">追加行 ${rows.filter(r=>r.n).length}</div></div>`;
  monthChart('cM_'+area,rows);
  rateBar('cS_'+area,groupTA(rows,'s'));
  rateBar('cO_'+area,groupTA(rows,'o'));
  rateBar('cB_'+area,groupTA(rows,'b'));
  const items=rows.map(r=>{const t=r.t.slice(0,6).reduce((a,b)=>a+b,0),a=r.v?r.v.reduce((x,y)=>x+y,0):0;return{r,t,a,gap:t-a,p:pct(a,t)};});
  document.getElementById('gap_'+area).innerHTML=items.filter(x=>x.gap>0).sort((a,b)=>b.gap-a.gap).slice(0,10)
    .map(x=>`<li><span>${x.r.m}<span class="who"> · ${x.r.s} · ${x.r.o}</span></span><b style="color:var(--warn)">-${fmt(x.gap)}</b></li>`).join('')||'<li>无</li>';
  document.getElementById('low_'+area).innerHTML=items.filter(x=>x.t>=50&&x.p!==null).sort((a,b)=>a.p-b.p).slice(0,10)
    .map(x=>`<li><span>${x.r.m}<span class="who"> · ${x.r.s} · ${x.r.o}</span></span><b style="color:var(--warn)">${x.p.toFixed(1)}%</b></li>`).join('')||'<li>无</li>';
}

let sortCol=-1,sortAsc=false;
function renderTable(){
  const rows=filtered();
  const heads=['区域','品牌','站点','负责人','新老品','SKU','型号','1–6月目标','1–6月实际','达成率','缺口','全年目标'];
  document.getElementById('thr').innerHTML=heads.map((h,i)=>`<th class="${i>=7?'num':''}" onclick="doSort(${i})">${h}${sortCol===i?(sortAsc?' ▲':' ▼'):''}</th>`).join('');
  let tr=rows.map(r=>{
    const t6=r.t.slice(0,6).reduce((a,b)=>a+b,0),a6=r.v?r.v.reduce((x,y)=>x+y,0):0;
    return [r.a,r.b,r.s,r.o,r.c,r.k,r.m,t6,a6,pct(a6,t6),t6-a6,r.t.reduce((a,b)=>a+b,0),r.n,r.v!==null];
  });
  if(sortCol>=0)tr.sort((x,y)=>{const a=x[sortCol],b=y[sortCol];
    if(a===null)return 1;if(b===null)return -1;
    return(typeof a==='number'?a-b:String(a).localeCompare(String(b),'zh'))*(sortAsc?1:-1);});
  document.getElementById('tbody').innerHTML=tr.map(r=>{
    let owner=r[3];
    if(owner==='待分配负责人')owner=`<span class="tag unassigned">待分配负责人</span>`;
    else if(owner==='离职人员')owner=`<span class="tag left">离职人员</span>`;
    const p=r[9];
    const rate=p===null?`<span class="rate na">—</span>`:`<span class="rate ${p>=100?'g':p>=60?'y':'r'}">${p.toFixed(1)}%</span>`;
    const skuCell=r[5]+(r[12]?' <span class="tag append">追加</span>':'');
    const actCell=r[13]?fmt(r[8]):'<span style="color:var(--mut)">未录入</span>';
    return `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${owner}</td><td>${r[4]}</td><td>${skuCell}</td><td>${r[6]}</td>`+
      `<td class="num">${fmt(r[7])}</td><td class="num">${actCell}</td><td class="num">${rate}</td>`+
      `<td class="num" style="color:${r[10]>0?'var(--warn)':'var(--ok)'}">${r[10]>0?'-':'+'}${fmt(Math.abs(r[10]))}</td><td class="num">${fmt(r[11])}</td></tr>`;
  }).join('');
}
function doSort(i){sortAsc=sortCol===i?!sortAsc:false;sortCol=i;renderTable();}

function areaSuffix(){
  const sel=[...MS.fArea];
  if(!sel.length||sel.length>1)return '（SC&VC）';
  return '（'+sel[0]+'）';
}
function render(){
  const rows=filtered();
  const sc=rows.filter(r=>r.a==='SC'),vc=rows.filter(r=>r.a==='VC');
  const t6=sumT6(rows),a6=sumA6(rows),ty=sumTY(rows);
  document.getElementById('kpis0').innerHTML=
    kpiHtml('整体 1–6月',t6,a6)+kpiHtml('SC 1–6月',sumT6(sc),sumA6(sc))+kpiHtml('VC 1–6月',sumT6(vc),sumA6(vc))+
    `<div class="kpi"><div class="v">${fmt(a6)}</div><div class="l">1–6月实际合计</div><div class="s">SC ${fmt(sumA6(sc))}｜VC ${fmt(sumA6(vc))}</div></div>`+
    `<div class="kpi"><div class="v">${fmt(ty)}</div><div class="l">全年目标</div><div class="s">时间进度 ${TIME_PROG}%｜全年完成 ${pctTxt(pct(a6,ty))}</div></div>`;
  monthChart('cAll',rows,[{label:'SC',rows:sc},{label:'VC',rows:vc}]);
  mkChart('cAreaCmp',{type:'bar',data:{labels:['SC','VC'],datasets:[
    {label:'目标(1–6月)',data:[sumT6(sc),sumT6(vc)],backgroundColor:'#c5d8e8',borderRadius:3},
    {label:'实际(1–6月)',data:[sumA6(sc),sumA6(vc)],backgroundColor:'#3a76ad',borderRadius:3}]},
    options:{plugins:{tooltip:{callbacks:{label:c=>c.dataset.label+': '+fmt(c.raw)+'台'}}},scales:{y:{ticks:{callback:fmt}}}}});
  const sfx=areaSuffix();
  document.getElementById('hBrand0').textContent='品牌 1–6月达成率'+sfx;
  document.getElementById('hSite0').textContent='站点 1–6月达成率'+sfx;
  rateBar('cBrand0',groupTA(rows,'b'));
  rateBar('cSite0',groupTA(rows,'s'));
  renderArea('SC');renderArea('VC');renderTable();
}
function showTab(i,btn){
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  document.querySelectorAll('.page').forEach((p,j)=>p.classList.toggle('on',i===j));
}
render();
</script>
